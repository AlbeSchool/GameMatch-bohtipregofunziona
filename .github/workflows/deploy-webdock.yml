name: Deploy to Webdock

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-webdock-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WEBDOCK_HOST }}
          username: ${{ secrets.WEBDOCK_USER }}
          key: ${{ secrets.WEBDOCK_SSH_KEY }}
          port: ${{ secrets.WEBDOCK_PORT }}
          script_stop: true
          script: |
            set -e
            cd ~/GameMatch-bohtipregofunziona
            git pull --ff-only origin main
            source .venv/bin/activate
            python3 -m pip install -r requirements.txt
            sudo systemctl restart gamematch.service
            curl -fsS http://127.0.0.1:8000/health/json
