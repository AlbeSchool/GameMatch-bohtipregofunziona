version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gamematch-db
    environment:
      POSTGRES_USER: gamematch
      POSTGRES_PASSWORD: gamematch_password
      POSTGRES_DB: gamematch
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gamematch-network
    restart: unless-stopped

  backend:
    build: .
    container_name: gamematch-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DATABASE_URL: postgresql://gamematch:gamematch_password@db:5432/gamematch
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
    networks:
      - gamematch-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  gamematch-network:
    driver: bridge
